services:

  # =========================================================
  # BASE DE DATOS DEL AUTH SERVICE
  # =========================================================
  cockroach-auth:
    image: cockroachdb/cockroach:v26.2.0
    container_name: scli-cockroach-auth

    command:
      - start-single-node
      - --insecure
      - --store=/cockroach/cockroach-data

    ports:
      - "26257:26257"
      - "8088:8080"

    volumes:
      - cockroach-auth-data:/cockroach/cockroach-data

    healthcheck:
      test:
        [
          "CMD",
          "cockroach",
          "sql",
          "--insecure",
          "--host=localhost:26257",
          "--execute=SELECT 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - scli-network


  # Crea la base del Auth Service
  cockroach-auth-init:
    image: cockroachdb/cockroach:v26.2.0
    container_name: scli-cockroach-auth-init

    depends_on:
      cockroach-auth:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c
      - |
        cockroach sql \
          --insecure \
          --host=cockroach-auth:26257 \
          --execute="CREATE DATABASE IF NOT EXISTS auth_db;"

    restart: "no"

    networks:
      - scli-network


  # =========================================================
  # BASE DE DATOS DEL USUARIOS SERVICE
  # =========================================================
  cockroach-usuarios:
    image: cockroachdb/cockroach:v24.3.5
    container_name: scli-cockroach-usuarios

    command:
      - start-single-node
      - --insecure
      - --store=/cockroach/cockroach-data

    ports:
      - "26258:26257"
      - "8089:8080"

    volumes:
      - cockroach-usuarios-data:/cockroach/cockroach-data

    healthcheck:
      test:
        [
          "CMD",
          "cockroach",
          "sql",
          "--insecure",
          "--host=localhost:26257",
          "--execute=SELECT 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - scli-network


  # Crea la base del Usuarios Service
  cockroach-usuarios-init:
    image: cockroachdb/cockroach:v24.3.5
    container_name: scli-cockroach-usuarios-init

    depends_on:
      cockroach-usuarios:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c
      - |
        cockroach sql \
          --insecure \
          --host=cockroach-usuarios:26257 \
          --execute="CREATE DATABASE IF NOT EXISTS usuarios_db;"

    restart: "no"

    networks:
      - scli-network


  # =========================================================
  # MICROSERVICIO DE USUARIOS
  # =========================================================
  usuarios-service:
    build:
      context: ./usuarios-service
      dockerfile: Dockerfile

    container_name: scli-usuarios-service

    ports:
      - "8082:8082"

    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://cockroach-usuarios:26257/usuarios_db?sslmode=disable
      DB_USERNAME: root
      DB_PASSWORD: ""
      INTERNAL_API_KEY: clave-interna-desarrollo

    depends_on:
      cockroach-usuarios:
        condition: service_healthy
      cockroach-usuarios-init:
        condition: service_completed_successfully

    restart: unless-stopped

    networks:
      - scli-network


  # =========================================================
  # BASE DE DATOS DEL ACADEMICO-LABORATORIOS SERVICE
  # =========================================================
  cockroach-academico:
    image: cockroachdb/cockroach:v26.2.0
    container_name: scli-cockroach-academico

    command:
      - start-single-node
      - --insecure
      - --store=/cockroach/cockroach-data

    ports:
      - "26259:26257"
      - "8090:8080"

    volumes:
      - cockroach-academico-data:/cockroach/cockroach-data

    healthcheck:
      test:
        [
          "CMD",
          "cockroach",
          "sql",
          "--insecure",
          "--host=localhost:26257",
          "--execute=SELECT 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - scli-network


  # Crea la base del Academico-Laboratorios Service
  cockroach-academico-init:
    image: cockroachdb/cockroach:v26.2.0
    container_name: scli-cockroach-academico-init

    depends_on:
      cockroach-academico:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c
      - |
        cockroach sql \
          --insecure \
          --host=cockroach-academico:26257 \
          --execute="CREATE DATABASE IF NOT EXISTS academico_db;"

    restart: "no"

    networks:
      - scli-network


  # =========================================================
  # MICROSERVICIO ACADEMICO-LABORATORIOS
  # =========================================================
  academico-laboratorios-service:
    build:
      context: ./academico-laboratorios-service
      dockerfile: Dockerfile

    container_name: scli-academico-laboratorios-service

    ports:
      - "8083:8083"

    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://cockroach-academico:26257/academico_db?sslmode=disable&options=-c%20allow_unsafe_internals%3Dtrue
      DB_USERNAME: root
      DB_PASSWORD: ""
      INTERNAL_API_KEY: clave-interna-desarrollo

    depends_on:
      cockroach-academico:
        condition: service_healthy
      cockroach-academico-init:
        condition: service_completed_successfully

    networks:
      - scli-network


volumes:

  cockroach-auth-data:

  cockroach-usuarios-data:

  cockroach-academico-data:


networks:

  scli-network:
    driver: bridge